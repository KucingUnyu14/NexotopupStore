<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexotopupStore - Top Up Game Murah</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:600;
}

nav a{
color:#cbd5f5;
margin-left:20px;
text-decoration:none;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:40px;
margin-bottom:15px;
}

.hero p{
color:#94a3b8;
}

.games{
padding:40px;
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.game{
background:#1e293b;
padding:20px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:.2s;
}

.game:hover{
transform:scale(1.05);
}

.order{
max-width:500px;
margin:40px auto;
background:#1e293b;
padding:25px;
border-radius:12px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

footer{
text-align:center;
padding:30px;
margin-top:40px;
background:#020617;
color:#94a3b8;
}

</style>
</head>

<body>

<header>
<div class="logo">NexotopupStore</div>
<nav>
<a href="#">Home</a>
<a href="#games">Game</a>
<a href="#order">Top Up</a>
</nav>
</header>

<section class="hero">
<h1>Top Up Game Murah & Cepat</h1>
<p>Proses cepat • Harga bersahabat • Aman terpercaya</p>
</section>

<section class="games" id="games">

<h2>Game Populer</h2>

<div class="grid">

<div class="game">Mobile Legends</div>
<div class="game">Free Fire</div>
<div class="game">PUBG Mobile</div>
<div class="game">Valorant</div>

</div>

</section>

<section class="order" id="order">

<h2>Top Up Mobile Legends</h2>

<label>ID Game</label>
<input id="idgame" placeholder="Masukkan ID Game">

<label>Server</label>
<input id="server" placeholder="Contoh: 1234">

<label>Pilih Diamond</label>
<select id="produk">

<option>86 Diamond - Rp20.000</option>
<option>172 Diamond - Rp40.000</option>
<option>257 Diamond - Rp60.000</option>
<option>344 Diamond - Rp80.000</option>
<option>429 Diamond - Rp100.000</option>

</select>

<button onclick="order()">Pesan via WhatsApp</button>

</section>

<footer>

<p>© 2026 NexotopupStore</p>
<p>Top Up Game Murah dan Aman</p>

</footer>

<script>

function order(){

let id=document.getElementById("idgame").value
let server=document.getElementById("server").value
let produk=document.getElementById("produk").value

let text=`Halo admin NexotopupStore saya mau top up

ID Game: ${id}
Server: ${server}
Produk: ${produk}`

window.open(`https://wa.me/6285369408241?text=${encodeURIComponent(text)}`)

}

</script>

</body>
</html>
